<style>
    .tg-slidercontent {
        background: rgba(51, 51, 51, 0.5);
    }

    .tg-latestnews .tg-btnsbox {
        padding: 10px;
    }

    body.tg-home .tg-main {
        padding: 0px;
    }

    /* Fix Home Banner Slider and Noticeboard layout on mobile/desktop */
    .tg-homebannervtwo {
        display: flex;
        flex-wrap: wrap;
    }
    .tg-homebannervtwo .tg-homeslider {
        width: 100% !important;
        float: none !important;
    }
    @media (min-width: 992px) {
        .tg-homebannervtwo .tg-homeslider {
            width: 75% !important;
        }
        .tg-homebannervtwo.tg-nobanner .tg-homeslider {
            width: 100% !important;
        }
    }
    .tg-noticeboardarea {
        width: 25% !important;
        float: right !important;
    }
    .tg-noticeboardarea img {
        width: 100%;
        height: auto;
        display: block;
    }

    p {
        line-height: 25px;
    }

    .disabled {
        pointer-events:none; /*This makes it not clickable*/
        opacity:0.6;         /*This grays it out to look disabled*/
    }

    .tg-rectormessage figure { 
        width:164px;
        border: 3px solid #ddd;
    }

    .tg-rectormessage  { 
        padding: 0 auto 0 0;
    }

    /* BS5 replacement for .media-left, .media>.pull-left */
    .tg-media-left {
        padding-right: 23px;
        padding-bottom: 10px;
    }
    

    .tg-rectormessage figure:before { 
        
        border: 0px;
    }    

    .tg-featuredimg a .co-container {
        position: relative;
        width: 100%;
    }

    .tg-featuredimg a .co-container img {
        width: 500px;
        height: auto;
    }

    .tg-featuredimg .co-container .btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        -ms-transform: translate(-50%, -50%);
        background-color: rgba(0, 0, 0, 0);
        color: red;
        font-size: 40px;
        border: none;
        cursor: pointer;
        text-align: center;
        z-index: 100;
        outline: none;
    }

    .tg-featuredimg .co-container .btn:hover {
        background-color: white;
    }

    .tg-featuredimg-wide a img {
        width: 100%; /*870px;*/
    }    
    .tg-noticeboard img {
        height: 68px;
    }
    .tg-tollfree a {
        color: white;
    }

    .tg-welcomeandgreeting figure {
        border: 3px solid #ddd;
    }

    /* ============================================================
       NAVIGATION REDESIGN — match screenshot style
       ============================================================ */

    /* ── Desktop collapse fix ── */
    @media (min-width: 992px) {
        #tg-navigation.collapse {
            display: block !important;
        }
        .navbar-header .navbar-toggler {
            display: none;
        }
    }
    @media (max-width: 991.98px) {
        #tg-navigation.collapse:not(.show) {
            display: none !important;
        }
        #tg-navigation.collapse.show {
            display: block !important;
        }
    }

    /* ── Nav wrapper ── */
    .tg-navigationarea {
        background: #fff !important;
        border-top: 1px solid #e8e8e8;
        border-bottom: 1px solid #e8e8e8;
    }
    .tg-nav {
        width: 100%;
    }
    .tg-navigation {
        background: #fff;
    }

    /* ── Top-level list: horizontal row ── */
    .tg-navigation > ul {
        display: flex !important;
        flex-wrap: nowrap;
        list-style: none;
        margin: 0;
        padding: 0;
        float: none !important;
    }
    .tg-navigation > ul > li {
        float: none !important;
        position: relative;
    }

    /* ── Top-level links ── */
    .tg-navigation > ul > li > a {
        display: flex !important;
        align-items: center;
        gap: 4px;
        padding: 0 18px !important;
        height: 44px;
        line-height: 44px;
        color: #333 !important;
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        text-decoration: none;
        transition: background 0.18s, color 0.18s;
    }

    /* ── Hover & active state: blue background ── */
    .tg-navigation > ul > li:hover > a,
    .tg-navigation > ul > li.current-menu-item > a,
    .tg-navigation > ul > li.active > a {
        background: #2563eb !important;
        color: #fff !important;
    }

    /* ── Caret for parent items (replaces FontAwesome :before) ── */
    li.menu-item-has-children > a::after {
        content: "▾";
        font-size: 11px;
        font-family: inherit;
        line-height: 1;
        margin-left: 2px;
    }
    /* Remove the old FontAwesome pseudo-element */
    li.menu-item-has-children > a::before,
    li.menu-item-has-mega-menu > a::before {
        display: none !important;
        content: none !important;
    }

    /* ── Dropdown / sub-menu ── */
    .tg-navigation .sub-menu {
        top: 44px !important;      /* flush below the nav bar */
        left: 0;
        z-index: 9999;
        min-width: 180px;
        width: auto;
        background: #fff;
        border: 1px solid #e0e0e0;
        border-top: 2px solid #2563eb;
        box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        border-radius: 0 0 6px 6px;
        padding: 4px 0;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.18s, visibility 0.18s;
        display: block !important;  /* always in DOM, hidden via opacity */
    }
    .tg-navigation ul li:hover > .sub-menu {
        opacity: 1;
        visibility: visible;
    }
    .tg-navigation .sub-menu li {
        float: none !important;
        width: 100% !important;
        border-top: none !important;
    }
    .tg-navigation .sub-menu li + li {
        border-top: 1px solid #f0f0f0 !important;
    }
    .tg-navigation .sub-menu li a {
        display: block;
        padding: 9px 18px !important;
        color: #444 !important;
        font-size: 13px;
        white-space: nowrap;
        line-height: 1.5 !important;
        height: auto !important;
    }
    .tg-navigation .sub-menu li:hover > a,
    .tg-navigation .sub-menu li > a:hover {
        color: #2563eb !important;
        background: #f0f5ff !important;
    }
    /* Remove left-bar pseudo on sub items */
    .sub-menu > li > a::before {
        display: none !important;
        content: none !important;
    }

    /* ── Mobile: stack vertically ── */
    @media (max-width: 991.98px) {
        .tg-navigation > ul {
            flex-direction: column !important;
        }
        .tg-navigation > ul > li > a {
            height: auto;
            line-height: 1.5;
            padding: 10px 16px !important;
        }
        .tg-navigation .sub-menu {
            position: static !important;
            opacity: 1 !important;
            visibility: visible !important;
            box-shadow: none !important;
            border: none !important;
            border-left: 3px solid #2563eb !important;
            border-radius: 0 !important;
            padding: 0 !important;
            margin-left: 16px;
        }
        .tg-navigation .sub-menu li a {
            padding: 8px 16px !important;
        }
    }
</style>

<style>

        .btn-back-to-top:hover {

        }

        .show-btn-back-to-top {bottom: 0;}



</style>
