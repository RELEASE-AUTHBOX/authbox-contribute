<style>
    .tg-slidercontent {
        background: rgba(51, 51, 51, 0.5);
    }

    .tg-latestnews .tg-btnsbox {
        padding: 10px;
    }

    body.tg-home .tg-main {
        padding: 0px;
    }

    /* Fix Home Banner Slider and Noticeboard layout on mobile/desktop */
    .tg-homebannervtwo {
        display: flex;
        flex-wrap: wrap;
    }
    .tg-homebannervtwo .tg-homeslider {
        width: 100% !important;
        float: none !important;
    }
    @media (min-width: 992px) {
        .tg-homebannervtwo .tg-homeslider {
            width: 75% !important;
        }
        .tg-homebannervtwo.tg-nobanner .tg-homeslider {
            width: 100% !important;
        }
    }
    .tg-noticeboardarea {
        width: 25% !important;
        float: right !important;
    }
    .tg-noticeboardarea img {
        width: 100%;
        height: auto;
        display: block;
    }

    p {
        line-height: 25px;
    }

    .disabled {
        pointer-events:none; /*This makes it not clickable*/
        opacity:0.6;         /*This grays it out to look disabled*/
    }

    .tg-rectormessage figure { 
        width:164px;
        border: 3px solid #ddd;
    }

    .tg-rectormessage  { 
        padding: 0 auto 0 0;
    }

    /* BS5 replacement for .media-left, .media>.pull-left */
    .tg-media-left {
        padding-right: 23px;
        padding-bottom: 10px;
    }
    

    .tg-rectormessage figure:before { 
        
        border: 0px;
    }    

    .tg-featuredimg a .co-container {
        position: relative;
        width: 100%;
    }

    .tg-featuredimg a .co-container img {
        width: 500px;
        height: auto;
    }

    .tg-featuredimg .co-container .btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        -ms-transform: translate(-50%, -50%);
        background-color: rgba(0, 0, 0, 0);
        color: red;
        font-size: 40px;
        border: none;
        cursor: pointer;
        text-align: center;
        z-index: 100;
        outline: none;
    }

    .tg-featuredimg .co-container .btn:hover {
        background-color: white;
    }

    .tg-featuredimg-wide a img {
        width: 100%; /*870px;*/
    }    
    .tg-noticeboard img {
        height: 68px;
    }
    .tg-tollfree a {
        color: white;
    }

    .tg-welcomeandgreeting figure {
        border: 3px solid #ddd;
    }

    /* BS3 hidden-* compatibility via BS5 display utilities */
    /* These are provided as fallback if the template CSS uses these classes */
</style>

<style>


    /*//////////////////////////////////////////////////////////////////
    [ BUTTON BACK TO TOP ]  #17b978;*/
    .btn-back-to-top {
    display: -webkit-box;
    display: -webkit-flex;
    display: -moz-box;
    display: -ms-flexbox;
    display: flex;
    position: fixed;
    width: 35px;
    height: 35px;
    bottom: -40px;
    right: 40px;
    background-color: #3575d3;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0.6;
    cursor: pointer;
    transition: all 0.4s;
    -webkit-transition: all 0.4s;
    -o-transition: all 0.4s;
    -moz-transition: all 0.4s;
    }

    .symbol-btn-back-to-top {
        font-size: 18px;
        color: white;
        line-height: 1em;
        }

        .btn-back-to-top:hover {
        opacity: 1;
        }

        @media (max-width: 575px) {
        .btn-back-to-top {
            bottom: 0px;
            right: 15px;
        }
        }

        .show-btn-back-to-top {bottom: 0;}



</style>
