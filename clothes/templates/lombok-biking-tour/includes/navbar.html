{% load static %}
    <nav id="mainNav"
        x-data="{ mobileMenuOpen: false }" 
        {% if navbar_transparent %}
        :class="{ 'bg-white shadow-md py-2': scrolled, 'bg-transparent py-4 text-white': !scrolled }"
        class="fixed top-0 w-full z-50 transition duration-300 bg-transparent py-4 text-white"
        {% else %}
        class="fixed top-0 w-full z-50 transition duration-300 bg-white shadow-md py-2"
        {% endif %}
        >
        
        <div class="container mx-auto px-6 md:px-12 max-w-6xl">
            <div class="flex justify-between items-center">
                
                <!-- Brand -->
                <a href="/" class="flex items-center gap-2 font-heading font-bold text-xl transition-colors shrink-0 {% if navbar_transparent %}text-white{% else %}text-gray-900{% endif %}"
                   {% if navbar_transparent %}:class="scrolled ? 'text-gray-900' : 'text-white'"{% endif %}>
                   <img src="{% static 'lombok-biking-tour/assets/themes/img/Logo.png' %}" alt="Logo" class="h-10">
                   <span class="hidden sm:inline">{% if agency_meta %}{{agency_meta.name|title}}{% else %}{{name|title}}{% endif %}</span>
                </a>
                
                <!-- Mobile Menu Button -->
                <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden p-2 rounded focus:outline-none {% if navbar_transparent %}text-white{% else %}text-gray-800{% endif %}" {% if navbar_transparent %}:class="scrolled ? 'text-gray-800' : 'text-white'"{% endif %}>
                    <i class="fa fa-bars text-2xl"></i>
                </button>
                
                <!-- Desktop Nav -->                
                <div class="hidden md:flex space-x-6">
                    {% for i in my_menu %}
                        <a href="{{i.link}}" class="text-sm font-semibold uppercase tracking-wider hover:text-primary transition-colors {% if navbar_transparent %}text-white/80{% else %}text-gray-600{% endif %}" {% if navbar_transparent %}:class="scrolled ? 'text-gray-700' : 'text-white/80'"{% endif %}>{{i.name}}</a>
                    {% endfor %}
                </div>
            </div>
            
            <!-- Mobile Nav Sidebar/Dropdown -->
            <div x-show="mobileMenuOpen" 
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0 -translate-y-2"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-150"
                 x-transition:leave-start="opacity-100 translate-y-0"
                 x-transition:leave-end="opacity-0 -translate-y-2"
                 @click.outside="mobileMenuOpen = false"
                 class="md:hidden mt-4 bg-white rounded shadow-lg absolute left-4 right-4 text-gray-800 font-semibold" style="display: none;">
                <div class="flex flex-col py-2">
                    {% for i in my_menu %}
                        <a href="{{i.link}}" @click="mobileMenuOpen = false" class="px-4 py-2 hover:bg-gray-100 hover:text-primary">{{i.name}}</a>
                    {% endfor %}
                </div>
            </div>
        </div>
    </nav>
