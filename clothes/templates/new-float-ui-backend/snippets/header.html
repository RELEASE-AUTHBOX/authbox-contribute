 <nav :class="isScrolled ? 'py-2 bg-white/80 backdrop-blur-md shadow-lg' : 'py-4 bg-white/95'"

    x-data="{

        mobileMenuOpen: false,
        avatarMenuOpen: false,

            { title: 'Kelebihan', path: 'scroll_to(\'feature\');' },

            { title: 'Harga', path: 'scroll_to(\'price\');' },
            { title: 'Kontak', path: 'scroll_to(\'contact\');' }

        data-modal-code="logo-1" 
        data-modal-title="" 
        data-modal-type="image" 
        data-modal-width="131" 
        data-modal-height="57" 
        data-modal-list="0"
        data-tooltip="Link ini hanya tampil di mode edit. Silahkan klik untuk mengedit data!"

        <!-- <div x-show="loading">
            <div class="h-10 w-full bg-gray-300 rounded-lg animate-pulse"></div>

        <!-- :class="isScrolled ? 'h-10' : 'h-15'"{% static 'loading.gif' %}" -->
          <!-- x-show="!loading" 
            @load="loading = false"  -->
        
        <img :class="{ 'h-10': isScrolled, 'h-12': !isScrolled }"  alt="Logo" 
            class="transition-all duration-300 " 
            src="{% static 'loading-3.gif' %}" />                
      </button>
     </a>
    </div>
    <!-- Desktop Navigation -->
    <div class="hidden lg:flex lg:items-center lg:space-x-6 flex-1 justify-end">

      <a :onclick="item.path" class="text-gray-700 hover:text-gray-900 transition-colors" href="javascript:void(0)" x-text="item.title">
      </a>
     </template>
     <a @click="scroll_to('home'); openModal();" class="flex items-center justify-center gap-x-1 py-1 px-3 text-white font-medium bg-sky-500 hover:bg-sky-400 active:bg-sky-600 rounded-full md:inline-flex" href="javascript:void(0)">

      </span>
      <svg class="w-5 h-5 mt-1" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">

       </path>

        <path clip-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" fill-rule="evenodd">

   <!-- Modal -->

    <div @click.outside="closeModal()" class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4 overflow-hidden transform transition-all duration-300" x-bind:class="isOpen ? 'scale-100' : 'scale-95'" x-transition:enter="ease-out duration-300" x-transition:enter-end="opacity-100 scale-100" x-transition:enter-start="opacity-0 scale-95" x-transition:leave="ease-in duration-200" x-transition:leave-end="opacity-0 scale-95" x-transition:leave-start="opacity-100 scale-100">

      <button :class="activeTab === 'login' ? 'bg-indigo-50 text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-600 hover:text-gray-900'" @click="activeTab = 'login'" class="flex-1 py-4 font-medium text-center transition-colors duration-300">

       </i>
       Login

       <i class="fas fa-user-plus mr-2">
       </i>
       Register
      </button>
     </div>
     <!-- Content -->
     <div class="p-6">
      <!-- Login Form -->
      <div x-show="activeTab === 'login'" x-transition="">
       <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
        Welcome Back
       </h2>
       <!-- Social Login Buttons -->
       <div class="space-y-3 mb-6">
        <button @click="socialLogin('google')" class="w-full flex items-center justify-center bg-white border border-gray-300 rounded-lg py-3 px-4 text-gray-700 font-medium hover:bg-gray-50 transition duration-300">
         <i class="fab fa-google text-red-500 mr-3">
         </i>
         Continue with Google
        </button>
        <button @click="socialLogin('facebook')" class="w-full flex items-center justify-center bg-blue-600 text-white rounded-lg py-3 px-4 font-medium hover:bg-blue-700 transition duration-300">
         <i class="fab fa-facebook-f mr-3">
         </i>
         Continue with Facebook
        </button>
        <button @click="socialLogin('twitter')" class="w-full flex items-center justify-center bg-black text-white rounded-lg py-3 px-4 font-medium hover:bg-gray-800 transition duration-300">
         <i class="fab fa-twitter mr-3">
         </i>
         Continue with Twitter
        </button>
       </div>
       <div class="flex items-center my-6">
        <div class="flex-1 border-t border-gray-300">
        </div>
        <span class="px-3 text-gray-500 text-sm">
         Or login with email
        </span>
        <div class="flex-1 border-t border-gray-300">
        </div>
       </div>
       <!-- Email Login Form -->
       <form @submit.prevent="handleLogin()">
        <div class="mb-4">
         <label class="block text-gray-700 text-sm font-medium mb-2" for="login-email">
          Email Address
         </label>
         <input class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-300" id="login-email" placeholder="your@email.com" required type="email" x-model="loginForm.email"/>
        </div>
        <div class="mb-6">
         <label class="block text-gray-700 text-sm font-medium mb-2" for="login-password">
          Password
         </label>
         <input class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-300" id="login-password" placeholder="••••••••" required type="password" x-model="loginForm.password"/>
        </div>
        <div class="flex items-center justify-between mb-4">
         <label class="flex items-center text-sm text-gray-700">
          <input class="rounded border-gray-300 text-indigo-600 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" type="checkbox"/>
          <span class="ml-2">
           Remember me
          </span>
         </label>
         <a class="text-sm text-indigo-600 hover:text-indigo-800" href="#">
          Forgot password?
         </a>
        </div>
        <button class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition duration-300" type="submit">
         Sign In
        </button>
       </form>
      </div>
      <!-- Register Form -->
      <div x-show="activeTab === 'register'" x-transition="">
       <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
        Create Account
       </h2>
       <!-- Social Register Buttons -->
       <div class="space-y-3 mb-6">
        <button @click="socialRegister('google')" class="w-full flex items-center justify-center bg-white border border-gray-300 rounded-lg py-3 px-4 text-gray-700 font-medium hover:bg-gray-50 transition duration-300">
         <i class="fab fa-google text-red-500 mr-3">
         </i>
         Sign up with Google
        </button>
        <button @click="socialRegister('facebook')" class="w-full flex items-center justify-center bg-blue-600 text-white rounded-lg py-3 px-4 font-medium hover:bg-blue-700 transition duration-300">
         <i class="fab fa-facebook-f mr-3">
         </i>
         Sign up with Facebook
        </button>
        <button @click="socialRegister('twitter')" class="w-full flex items-center justify-center bg-black text-white rounded-lg py-3 px-4 font-medium hover:bg-gray-800 transition duration-300">
         <i class="fab fa-twitter mr-3">
         </i>
         Sign up with Twitter
        </button>
       </div>
       <div class="flex items-center my-6">
        <div class="flex-1 border-t border-gray-300">
        </div>
        <span class="px-3 text-gray-500 text-sm">
         Or register with email
        </span>
        <div class="flex-1 border-t border-gray-300">
        </div>
       </div>
       <!-- Email Register Form -->
       <form @submit.prevent="handleRegister()">
        <div class="mb-4">
         <label class="block text-gray-700 text-sm font-medium mb-2" for="register-name">
          Full Name
         </label>
         <input class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-300" id="register-name" placeholder="John Doe" required type="text" x-model="registerForm.name"/>
        </div>
        <div class="mb-4">
         <label class="block text-gray-700 text-sm font-medium mb-2" for="register-email">
          Email Address
         </label>
         <input class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-300" id="register-email" placeholder="your@email.com" required type="email" x-model="registerForm.email"/>
        </div>
        <div class="mb-6">
         <label class="block text-gray-700 text-sm font-medium mb-2" for="register-password">
          Password
         </label>
         <input class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-300" id="register-password" placeholder="••••••••" required type="password" x-model="registerForm.password"/>
        </div>
        <div class="mb-4">
         <label class="flex items-center text-sm text-gray-700">
          <input class="rounded border-gray-300 text-indigo-600 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" required type="checkbox"/>
          <span class="ml-2">
           I agree to the
           <a class="text-indigo-600 hover:text-indigo-800" href="#">
            Terms of Service
           </a>
           &amp;
           <a class="text-indigo-600 hover:text-indigo-800" href="#">
            Privacy Policy
           </a>
          </span>
         </label>
        </div>
        <button class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition duration-300" type="submit">
         Create Account
        </button>
       </form>
      </div>
     </div>
    </div>
   </div>
   <!-- Toast Notification -->
   <div class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg z-50" x-show="showToast" x-transition:enter="transition ease-out duration-300 transform" x-transition:enter-end="translate-y-0 opacity-100" x-transition:enter-start="translate-y-10 opacity-0" x-transition:leave="transition ease-in duration-200 transform" x-transition:leave-end="translate-y-10 opacity-0" x-transition:leave-start="translate-y-0 opacity-100">
    <div class="flex items-center">
     <i class="fas fa-check-circle text-green-400 mr-2">
     </i>
     <span x-text="toastMessage">
     </span>
    </div>
   </div>
  </div>
 </nav>

            <a
