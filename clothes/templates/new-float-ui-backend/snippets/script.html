<script>
    function skeletonLoader() {
      return {
        loading: true, // Initial state: loading
        loadContent() {
          this.loading = true; // Show skeleton
          setTimeout(() => {
            this.loading = false; // Simulate data load
          }, 1000); // 2-second delay
        },
        init() {
          // Automatically load content on page load
          this.loadContent();
        }
      };
    }
  </script>
